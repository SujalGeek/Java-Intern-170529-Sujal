server:
  port: 8091

spring:
  application:
    name: API-GATEWAY

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Authentication & Profiles
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**, /api/users/**

        # Course Content, Enrollments, and Submissions
        - id: COURSE-SERVICE
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/course/**

        - id: ENROLLMENT
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/enrollments/**

        - id: SUBMISSION
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/submissions/**

        # Quiz & Assignments
        - id: QUIZ-SERVICE
          uri: lb://QUIZ-SERVICE
          predicates:
            - Path=/api/quiz/**

        - id: ASSIGNMENT-SERVICE
          uri: lb://ASSIGNMENT-SERVICE
          predicates:
            - Path=/api/assignments/**

        # Results & Performance
        - id: EXAM-RESULT-SERVICE
          uri: lb://EXAM-RESULT-SERVICE
          predicates:
            - Path=/api/exam-results/**

        - id: PERFORMANCE-SERVICE
          uri: lb://PERFORMANCE-SERVICE
          predicates:
            - Path=/api/performance/**

        # AI, Analytics & Predictions
        - id: PREDICTION-SERVICE
          uri: lb://PREDICTION-SERVICE
          predicates: 
            - Path=/api/predict/**

        - id: ANALYTICS-SERVICE
          uri: lb://ANALYTICS-SERVICE
          predicates:
            - Path=/api/analytics/**

        - id: AI-INTEGRATION-SERVICE
          uri: lb://AI-INTEGRATION-SERVICE
          predicates:
            - Path=/api/v1/exams/**, /api/v1/admin/**

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# JWT Configuration
